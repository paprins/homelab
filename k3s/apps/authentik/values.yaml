global:
    envFrom:
        - secretRef:
            name: authentik-secret-key

authentik:
    error_reporting:
        enabled: false
        send_pii: false
    postgresql:
        password: file:///postgres-creds/password

server:
    ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
            - auth.geeklabs.dev
    volumes:
        - name: postgres-creds
          secret:
            secretName: authentik-postgres-credentials
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
    volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true
        - name: dshm
          mountPath: /dev/shm

worker:
    volumes:
        - name: postgres-creds
          secret:
            secretName: authentik-postgres-credentials
    volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true

postgresql:
    enabled: true
    auth:
      username: authentik
      database: authentik
      existingSecret: authentik-postgres-credentials